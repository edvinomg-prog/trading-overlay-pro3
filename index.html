<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Trading Overlay Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="widget">

  <div class="top">
    <div class="live">● LIVE</div>
    <div id="wr">WR 0%</div>
  </div>

  <div class="stats">
    <div class="win">🟢 <span id="wins">0</span></div>
    <div class="lose">🔴 <span id="losses">0</span></div>
  </div>

  <div class="streak">
    🔥 STREAK: <span id="streak">0</span>
  </div>

  <div class="bar">
    <div id="barFill"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
